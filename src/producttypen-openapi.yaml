components:
  schemas:
    Bestand:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product_type_id:
          type: string
          format: uuid
        bestand:
          type: string
          format: uri
      required:
      - bestand
      - id
      - product_type_id
    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organisatie:
          allOf:
          - $ref: '#/components/schemas/Organisatie'
          readOnly: true
        organisatie_id:
          type: string
          format: uuid
          writeOnly: true
        voornaam:
          type: string
          description: voornaam van het contact
          maxLength: 255
        achternaam:
          type: string
          description: achternaam van het contact
          maxLength: 255
        email:
          type: string
          format: email
          title: Email adres
          description: email van het contact
          maxLength: 254
        telefoonnummer:
