    get:
      operationId: contacten_list
      description: Deze lijst kan gefilterd wordt met query-string parameters.
      summary: Alle CONTACTEN opvragen.
      parameters:
      - name: page
        required: false
        in: query
        description: Een pagina binnen de gepagineerde set resultaten.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Het aantal resultaten terug te geven per pagina.
        schema:
          type: integer
      tags:
      - contacten
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContactList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                BadRequestExample:
                  value:
                    prijsopties:
                    - Er is minimaal één optie vereist.
                    product_type_id:
                    - ‘<uuid>’ is geen geldige UUID.
                    actief_vanaf:
                    - 'Date heeft het verkeerde formaat, gebruik 1 van deze formaten:
                      DD-MM-YYYY.'
                  summary: Bad request example
                  description: Errors worden per veld teruggegeven. Hieronder volgt
                    een voorbeeld van het model Prijs.
          description: Validation error
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
          description: ''
    post:
      operationId: contacten_create
      description: Maak een CONTACT aan.
      summary: Maak een CONTACT aan.
      tags:
      - contacten
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contact'
            examples:
              CreateContact:
                value:
                  organisatie_id: 73a745d4-7df0-4510-991e-abfb19f0d861
                  voornaam: Bob
                  achternaam: de Vries
                  email: bob@example.com
                  telefoonnummer: '0611223344'
                  rol: medewerker
                summary: Create contact
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
              examples:
                CreateContact:
